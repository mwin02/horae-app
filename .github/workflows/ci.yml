name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            landing/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm ci
        working-directory: landing
      - run: npm run typecheck
        working-directory: landing
